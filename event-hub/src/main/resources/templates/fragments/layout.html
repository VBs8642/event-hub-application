<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - EventHub'">EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-vh: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1 0 auto;
        }
        .validation-error {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-success" href="/">
            <i class="fa-solid fa-calendar-days me-2"></i>EventHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/events/catalog">Explore Events</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/registrations/my-tickets">My Tickets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/events/dashboard">Dashboard</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-sm btn-outline-light px-3" href="/login">Sign In</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-dark text-white-50 py-4 mt-auto border-top border-secondary">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 text-center text-md-start">
                <p class="mb-0 small">&copy; 2026 EventHub Platform Inc. All rights reserved.</p>
                <p class="mb-0 text-muted extra-small" style="font-size: 0.75rem;">
                    Built with Spring Boot, Thymeleaf, and Bootstrap 5.
                </p>
            </div>
            <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                <div class="d-flex justify-content-center justify-content-md-end gap-3 fs-5">
                    <a href="#" class="text-white-50 text-decoration-none"><i class="fa-brands fa-twitter-x"></i></a>
                    <a href="#" class="text-white-50 text-decoration-none"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="text-white-50 text-decoration-none"><i class="fa-brands fa-linkedin"></i></a>
                </div>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

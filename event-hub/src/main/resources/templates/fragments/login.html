<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In - EventHub')}"></head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container my-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="card shadow border-0 p-4 w-100" style="max-width: 450px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Welcome Back</h2>
            <p class="text-muted small">Sign in to discover and book global event experiences</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center small py-2 mb-3">
            Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center small py-2 mb-3">
            You have been signed out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm mb-3">Sign In</button>

            <p class="text-center text-muted small mb-0">
                Don't have an account yet? <a href="/register" class="text-decoration-none fw-semibold">Sign Up</a>
            </p>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
